name: Terraform Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devsecops-terraform

    permissions:
      id-token: write
      contents: write

    env:
      AWS_REGION: ap-south-1

    outputs:
      ec2_ip: ${{ steps.tf.outputs.ec2_ip }}

    steps:
      - uses: actions/checkout@v4

      - run: ls -R

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform validate

      - run: terraform plan -out=tfplan
        if: ${{ github.event.inputs.action == 'apply' }}

      - run: terraform apply -auto-approve tfplan
        if: ${{ github.event.inputs.action == 'apply' }}

      - id: tf
        if: ${{ github.event.inputs.action == 'apply' }}
        run: echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - run: echo "EC2 IP: ${{ steps.tf.outputs.ec2_ip }}"
        if: ${{ github.event.inputs.action == 'apply' }}

  deploy-and-scan:
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event.inputs.action == 'apply' }}

    env:
      AWS_REGION: ap-south-1
      EC2_IP: ${{ needs.terraform.outputs.ec2_ip }}
      BRANCH: ${{ secrets.BRANCH }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clone App
        run: |
          if [ -z "$BRANCH" ]; then
            git clone ${{ secrets.GBLINK }} app
          else
            git clone -b $BRANCH ${{ secrets.GBLINK }} app
          fi

      - name: Setup SSH
        run: |
          echo "${{ secrets.KEY }}" > key.pem
          chmod 400 key.pem

      # =========================
      # INSTALL TOOLS
      # =========================
      - name: Install tools
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set +e

          sudo apt update -y
          sudo apt install -y docker.io unzip curl wget git openjdk-17-jdk
          sudo systemctl enable docker
          sudo systemctl start docker

          sudo usermod -aG docker ubuntu || true

          # Trivy
          if ! command -v trivy &> /dev/null; then
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
              | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt update -y
            sudo apt install -y trivy
          fi

          # Dependency Check FIXED
          cd /opt
          sudo rm -rf dependency-check
          sudo wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v8.4.0/dependency-check-8.4.0-release.zip
          sudo unzip -o dependency-check-8.4.0-release.zip
          sudo mv dependency-check /opt/dependency-check
          sudo chmod +x /opt/dependency-check/bin/dependency-check.sh

          EOF

      # =========================
      # SAST SCAN
      # =========================
      - name: SAST Scan
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set +e

          rm -rf /home/ubuntu/app
          git clone ${{ secrets.GBLINK }} /home/ubuntu/app

          cd /home/ubuntu/app
          mkdir -p reports

          # Build image safely
          if [ -f Dockerfile ]; then
            docker build -t app:latest .
          fi

          # TRIVY (JSON + TXT)
          trivy image app:latest -f json -o reports/trivy-image.json || true
          trivy image app:latest -f table -o reports/trivy-image.txt || true

          trivy fs . -f json -o reports/trivy-fs.json || true
          trivy fs . -f table -o reports/trivy-fs.txt || true

          # Dependency Check (HTML + TEXT)
          /opt/dependency-check/bin/dependency-check.sh \
            --scan . \
            --format ALL \
            --out reports/dependency-check || true

          EOF

      # =========================
      # DEPLOY + ZAP
      # =========================
      - name: Deploy + ZAP Scan
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'

          cd /home/ubuntu/app

          docker-compose down || true
          docker-compose up -d --build

          sleep 60

          mkdir -p reports/zap

          # FIXED PORT → frontend 5173
          docker run --rm \
            -v /home/ubuntu/app/reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5173 \
            -r /zap/wrk/zap/zap-report.html \
            -x /zap/wrk/zap/zap-report.xml \
            -J /zap/wrk/zap/zap-report.json \
            --auto || true

          EOF

      # =========================
      # FETCH REPORTS
      # =========================
      - name: Fetch Reports
        run: |
          mkdir -p reports
          scp -r -o StrictHostKeyChecking=no -i key.pem \
          ubuntu@$EC2_IP:/home/ubuntu/app/reports/* reports/ || true

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports