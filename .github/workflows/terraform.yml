name: Terraform Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devsecops-terraform

    permissions:
      id-token: write
      contents: write

    env:
      AWS_REGION: ap-south-1

    outputs:
      ec2_ip: ${{ steps.tf.outputs.ec2_ip }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      - name: Get EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        id: tf
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Print EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        run: echo "EC2 IP: ${{ steps.tf.outputs.ec2_ip }}"

      - name: Commit tfstate
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add terraform.tfstate || true
          git commit -m "update terraform state" || echo "No changes"
          git push

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve


  deploy-and-scan:
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event.inputs.action == 'apply' }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1
      EC2_IP: ${{ needs.terraform.outputs.ec2_ip }}
      BRANCH: ${{ secrets.BRANCH }}   # ✅ ADDED

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔹 Clone target repo (WITH BRANCH SUPPORT)
      - name: Clone Target Repo
        run: |
          if [ -z "$BRANCH" ]; then
            echo "No branch provided, using default"
            git clone ${{ secrets.GBLINK }} app
          else
            echo "Using branch: $BRANCH"
            git clone -b $BRANCH ${{ secrets.GBLINK }} app
          fi

      - name: Login to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $(echo $ECR_URI | cut -d'/' -f1)

      # 🔥 SMART BUILD
      - name: Build Docker Image (Smart)
        run: |
          cd app
          if [ -f "docker-compose.yml" ]; then
            echo "Using docker-compose"
            docker compose build
          else
            echo "Using Dockerfile"
            docker build -t devsecops-image .
          fi

      - name: Push to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
          docker tag $IMAGE $ECR_URI:latest
          docker push $ECR_URI:latest

      - name: Setup SSH
        run: |
          echo "${{ secrets.KEY }}" > key.pem
          chmod 400 key.pem

      - name: Deploy & Scan on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'

          cd /home/ubuntu/app
          rm -rf *
          git clone ${{ secrets.GBLINK }} .

          docker compose up -d --build

          # 🔹 Get image name
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)

          # 🔹 Trivy Image Scan
          trivy image $IMAGE -o trivy-image.txt

          # 🔹 Trivy FS Scan
          trivy fs . -o trivy-fs.txt

          # 🔹 OWASP Dependency Check
          mkdir reports
          dependency-check.sh --scan . --out reports

          # 🔹 ZAP DAST
          docker run -t owasp/zap2docker-stable zap-baseline.py \
            -t http://localhost \
            -r zap-report.html

          EOF

      - name: Fetch Reports
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP:/home/ubuntu/app/*.txt .
          scp -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP:/home/ubuntu/app/*.html .

      - name: Upload Reports to S3
        run: |
          aws s3 cp . s3://your-bucket-name/ --recursive

          