name: Terraform Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devsecops-terraform

    permissions:
      id-token: write
      contents: write

    env:
      AWS_REGION: ap-south-1

    outputs:
      ec2_ip: ${{ steps.tf.outputs.ec2_ip }}   # ✅ OUTPUT EXPOSED

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      # ✅ GET EC2 IP FROM TERRAFORM
      - name: Get EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        id: tf
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
      - name: Print EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "EC2 IP: ${{ steps.tf.outputs.ec2_ip }}"
      - name: Commit tfstate
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add terraform.tfstate || true
          git commit -m "update terraform state" || echo "No changes"
          git push
      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve

  deploy-and-scan:
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event.inputs.action == 'apply' }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1
      EC2_IP: ${{ needs.terraform.outputs.ec2_ip }}
      BRANCH: ${{ secrets.BRANCH }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4


      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clone App
        run: |
          if [ -z "$BRANCH" ]; then
            git clone ${{ secrets.GBLINK }} app
          else
            git clone -b $BRANCH ${{ secrets.GBLINK }} app
          fi

      - name: Login to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $(echo $ECR_URI | cut -d'/' -f1)


      - name: Build Docker Image (Smart)
        run: |
          cd app
          if [ -f "docker-compose.yml" ]; then
            docker compose build
          else
            docker build -t devsecops-image .
          fi


      - name: Push to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
          docker tag $IMAGE $ECR_URI:latest
          docker push $ECR_URI:latest

      - name: Setup SSH
        run: |
          echo "${{ secrets.KEY }}" > key.pem
          chmod 400 key.pem

      # =========================
      # INSTALL TOOLS
      # =========================
      - name: Deploy & Scan on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set -e   # ❗ fail fast (VERY IMPORTANT)

          echo "========================"
          echo "INSTALLING ALL TOOLS"
          echo "========================"

          sudo apt update -y
          sudo apt install -y docker.io unzip curl wget git awscli
          sudo systemctl enable docker
          sudo systemctl start docker
          sudo usermod -aG docker ubuntu || true

          # docker-compose
          sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-linux-x86_64 \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

          # trivy
          if ! command -v trivy &> /dev/null; then
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt update -y
            sudo apt install -y trivy
          fi

          # dependency check (FIXED)
          sudo apt install -y openjdk-17-jdk

          if [ ! -d "/opt/dependency-check" ]; then
            cd /opt
            sudo rm -rf dependency-check*

            sudo wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v8.4.0/dependency-check-8.4.0-release.zip
            sudo unzip dependency-check-8.4.0-release.zip

            # ✅ IMPORTANT: do NOT move if already correct
            if [ -d "dependency-check" ]; then
              sudo mv dependency-check dependency-check-temp || true
              sudo rm -rf /opt/dependency-check
              sudo mv dependency-check-temp /opt/dependency-check
            fi

            sudo chmod +x /opt/dependency-check/bin/dependency-check.sh
          fi

          docker --version
          trivy --version
          aws --version
          EOF


      - name: SAST Scan (Trivy + OWASP Dependency Check)
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set -e

          mkdir -p /home/ubuntu/app
          cd /home/ubuntu/app
          rm -rf *

          echo "========================"
          echo "CLONING REPO"
          echo "========================"

          git clone -b ${{ secrets.BRANCH }} ${{ secrets.GBLINK }} .

          echo "FILES AFTER CLONE:"
          ls -lah

          mkdir -p reports

          echo "========================"
          echo "LOGIN TO ECR"
          echo "========================"

          AWS_REGION=ap-south-1

          ACCOUNT_ID=$(aws sts get-caller-identity \
            --query Account \
            --output text \
            --region $AWS_REGION)

          ECR_URI=$(aws ecr describe-repositories \
            --region $AWS_REGION \
            --query 'repositories[0].repositoryUri' \
            --output text)

          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

          echo "========================"
          echo "PULL IMAGE FROM ECR"
          echo "========================"

          docker pull $ECR_URI:latest

          echo "========================"
          echo "TRIVY IMAGE SCAN"
          echo "========================"

          trivy image $ECR_URI:latest -f json -o reports/trivy-image.json
          trivy image $ECR_URI:latest -f table -o reports/trivy-image.txt

          echo "========================"
          echo "TRIVY FILE SYSTEM SCAN"
          echo "========================"

          trivy fs . -f json -o reports/trivy-fs.json
          trivy fs . -f table -o reports/trivy-fs.txt

          echo "========================"
          echo "DEPENDENCY CHECK"
          echo "========================"

          mkdir -p /home/ubuntu/dependency-db

          /opt/dependency-check/bin/dependency-check.sh \
            --scan . \
            --format ALL \
            --out reports/dependency-check \
            --data /home/ubuntu/dependency-db \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS 0 || true

          ls -R reports
          EOF


      - name: Deploy + ZAP Scan
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set -e

          cd /home/ubuntu/app

          echo "========================"
          echo "STARTING APP"
          echo "========================"

          if [ -f "docker-compose.yml" ]; then
            sudo docker-compose down || true
            sudo docker-compose up -d --build
          else
            echo "docker-compose.yml NOT FOUND ❌"
            exit 1
          fi

          echo "========================"
          echo "VERIFY CONTAINERS"
          echo "========================"

          docker ps -a

          echo "Waiting for app..."
          sleep 120

          echo "========================"
          echo "TEST APP"
          echo "========================"

          curl -I http://localhost:5173 || echo "App still not reachable"

          mkdir -p reports/zap

          echo "========================"
          echo "ZAP SCAN"
          echo "========================"

          docker run --rm \
            -v /home/ubuntu/app/reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5173 \
            -r /zap/wrk/zap/zap-report.html \
            -x /zap/wrk/zap/zap-report.xml \
            -J /zap/wrk/zap/zap-report.json \
            --auto || true

          ls -lah reports/zap
          EOF


      - name: Debug Reports
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP "ls -R /home/ubuntu/app/reports"


      - name: Fetch Reports
        run: |
          mkdir -p reports
          scp -r -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP:/home/ubuntu/app/reports/* reports/


      - name: Upload Reports to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports