name: Terraform Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devsecops-terraform   # ✅ FIXED PATH

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1

    steps:
      # ✅ Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Debug (optional but useful)
      - name: Show files
        run: ls -R

      # ✅ Configure AWS using OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Format check (pro)
     # - name: Terraform Format Check
      #  run: terraform fmt -check

      # ✅ Init
      - name: Terraform Init
        run: terraform init

      # ✅ Validate
      - name: Terraform Validate
        run: terraform validate

      # ✅ Plan (Apply flow)
      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform plan -out=tfplan

      # ✅ Apply
      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan


      # ✅ Save tfstate back to repo
      - name: Commit tfstate
        if: ${{ github.event.inputs.action == 'apply' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add terraform.tfstate terraform.tfstate.backup || true

          git commit -m "update terraform state" || echo "No changes to commit"

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main

      # ❌ Destroy (simplified & correct)
      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve