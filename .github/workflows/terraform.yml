
name: Terraform Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: devsecops-terraform

    permissions:
      id-token: write
      contents: write

    env:
      AWS_REGION: ap-south-1

    outputs:
      ec2_ip: ${{ steps.tf.outputs.ec2_ip }}   # ✅ OUTPUT EXPOSED

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      # ✅ GET EC2 IP FROM TERRAFORM
      - name: Get EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        id: tf
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
      - name: Print EC2 IP
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "EC2 IP: ${{ steps.tf.outputs.ec2_ip }}"
      - name: Commit tfstate
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add terraform.tfstate || true
          git commit -m "update terraform state" || echo "No changes"
          git push
      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve


  deploy-and-scan:
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event.inputs.action == 'apply' }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1
      EC2_IP: ${{ needs.terraform.outputs.ec2_ip }}
      BRANCH: ${{ secrets.BRANCH }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clone Target Repo
        run: |
          if [ -z "$BRANCH" ]; then
            git clone ${{ secrets.GBLINK }} app
          else
            git clone -b $BRANCH ${{ secrets.GBLINK }} app
          fi
      - name: Login to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $(echo $ECR_URI | cut -d'/' -f1)
      - name: Build Docker Image (Smart)
        run: |
          cd app
          if [ -f "docker-compose.yml" ]; then
            docker compose build
          else
            docker build -t devsecops-image .
          fi
      - name: Push to ECR
        run: |
          ECR_URI=$(aws ecr describe-repositories --query 'repositories[0].repositoryUri' --output text)
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)
          docker tag $IMAGE $ECR_URI:latest
          docker push $ECR_URI:latest
      - name: Setup SSH
        run: |
          echo "${{ secrets.KEY }}" > key.pem
          chmod 400 key.pem
      
      - name: Deploy & Scan on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << 'EOF'
          set -e

          echo "========================"
          echo "INSTALLING ALL TOOLS"
          echo "========================"

          sudo apt update -y

          # ------------------------
          # Docker + permissions
          # ------------------------
          sudo apt install -y docker.io docker-compose-plugin unzip curl wget git
          sudo systemctl enable docker
          sudo systemctl start docker
          sudo usermod -aG docker ubuntu || true

          # ------------------------
          # Trivy install
          # ------------------------
          if ! command -v trivy &> /dev/null; then
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt update -y
            sudo apt install -y trivy
          fi

          # ------------------------
          # OWASP Dependency Check
          # ------------------------
          sudo apt install -y openjdk-17-jdk

          if [ ! -d "/opt/dependency-check" ]; then
            cd /opt
            sudo wget -q https://github.com/jeremylong/DependencyCheck/releases/latest/download/dependency-check-8.4.0-release.zip
            sudo unzip -o dependency-check-8.4.0-release.zip -d dependency-check
            sudo chmod +x /opt/dependency-check/bin/dependency-check.sh
          fi

          echo "========================"
          echo "CLONING APP"
          echo "========================"

          cd /home/ubuntu/app
          rm -rf *
          git clone ${{ secrets.GBLINK }} .

          mkdir -p reports

          IMAGE_NAME="devsecops-image:latest"

          echo "========================"
          echo "SAST SCANS (TRIVY + OWASP DC)"
          echo "========================"

          # Build image locally
          docker build -t $IMAGE_NAME .

          # TRIVY IMAGE SCAN
          trivy image $IMAGE_NAME \
            --scanners vuln,secret \
            -f json \
            -o reports/trivy-image.json || true

          # TRIVY FILE SYSTEM SCAN
          trivy fs . \
            --scanners vuln,secret \
            -f json \
            -o reports/trivy-fs.json || true

          # OWASP DEPENDENCY CHECK (REAL HTML)
          /opt/dependency-check/bin/dependency-check.sh \
            --scan . \
            --project "devsecops" \
            --format HTML \
            --out reports/dependency-check || true

          echo "========================"
          echo "DEPLOYING APP"
          echo "========================"

          docker compose down || true
          docker compose up -d --build

          echo "WAITING FOR APP..."
          sleep 60

          echo "========================"
          echo "HEALTH CHECK"
          echo "========================"

          for i in {1..10}; do
            curl -s http://localhost:8080 && break || sleep 10
          done

          echo "========================"
          echo "DAST SCAN (ZAP)"
          echo "========================"

          docker pull ghcr.io/zaproxy/zaproxy:stable

          docker run --rm \
            -v /home/ubuntu/app/reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://host.docker.internal:8080 \
            -r /zap/wrk/zap-report.html \
            -x /zap/wrk/zap-report.xml \
            --auto || true

          echo "========================"
          echo "REPORT CHECK"
          echo "========================"

          ls -lah reports

          EOF
      # ✅ FIX: safer fetch (no failures if files missing)
      - name: Fetch Reports
        run: |
          mkdir -p reports
          scp -r -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP:/home/ubuntu/app/reports/* reports/ || true
      # 🔥 NEW: GitHub Artifacts (REPLACES S3)
      - name: Upload Reports to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports
